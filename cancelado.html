<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento Cancelado — R&B Modas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --red: #D0021B; --black: #0A0A0A; --white: #F8F8F8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 480px;
      background: #1A1A1A;
      border: 1px solid rgba(208,2,27,0.3);
      border-radius: 4px;
      padding: 3rem 2.5rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--red);
      margin-bottom: 0.75rem;
    }
    p { color: #C8C8C8; line-height: 1.6; }
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 14px 32px;
      background: var(--red);
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #a0011a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">❌</div>
    <h1>Pagamento Cancelado</h1>
    <p>Seu pagamento não foi concluído. Seu carrinho ainda está salvo.</p>
    <a href="index.html" class="btn">Voltar à Loja</a>
  </div>
</body>
</html>
